---
- hosts: 172.31.9.81
  become: yes
  tasks:
    - name: Install webserver on Redhat
     yum:
      name: httpd
      state: present
     when: ansible_os_family =="Redhat"

   - name: Start the web service on Redhat
     service:
      name: httpd
      state: started
     when: ansible_os_family =="Redhat"