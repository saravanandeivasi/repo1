---
- hosts: all
  become: yes
  tasks:
   - name: Install webserver
     apt:
      name: apache2
      state: present
     when: ansible_os_family =="Debian"

   - name: Install tree
     apt:
      name: tree
      state: present  

   - name: start the webserver
     service:
      name: apache2
      state: started 